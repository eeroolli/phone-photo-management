# config.example.conf
# Example configuration for photo import scripts
# Copy this file to config.conf and customize with your settings

# DEVICE CONNECTION
DEVICE_IP="192.168.1.100"           # Your phone's WiFi IP address
DEVICE_PORT="8022"                   # SSH port (default for Termux)
DEVICE_USER="u0_XXX"                 # Your Termux username (run 'whoami' in Termux)
SSH_KEY="/path/to/your/ssh/key"      # Path to your SSH private key

# PATHS
DEVICE_PHOTO_DIR="/storage/emulated/0/DCIM"  # Photos directory on your phone
DEVICE_PICTURES_DIR="/storage/emulated/0/Pictures"   # Optional: e.g. for "Album Adidas" and other app albums
LOCAL_STAGING_DIR="/path/to/your/staging/directory"  # Where photos are copied on computer

# PROJECT ROOT + LOGS (define PROJ_DIR before any ${PROJ_DIR}/... paths)
PROJ_DIR="/path/to/getphotosfromphone"       # Repo root (parent of scripts/ and lib/)
COPY_LOG="${PROJ_DIR}/logs/copy_log_$(date +%Y).csv"
MOVE_LOG="${PROJ_DIR}/logs/move_log_$(date +%Y).csv"
DELETE_LOG="${PROJ_DIR}/logs/delete_log_$(date +%Y).csv"
CROSS_DUP_LOG="${PROJ_DIR}/logs/cross_dup_$(date +%Y%m%d).log"
CROSS_DUP_OUTPUT_LIST="${PROJ_DIR}/logs/duplicates_to_remove.txt"

# Cross-folder duplicate cleanup (scripts/find_cross_folder_duplicates.sh)
# Redmi/Xiaomi Gallery: album folders often have a trailing space ("Adidas ", "owner "). Script tries that if 0 files.
CROSS_DUP_TARGET_DIR="/storage/emulated/0/Pictures/Gallery/owner/Adidas "  # Or ".../Adidas " (with trailing space)
# Space-separated paths. Default: all of DCIM (includes Camera, OpenCamera, etc.). Or list specific folders:
CROSS_DUP_REFERENCE_DIRS="$DEVICE_PHOTO_DIR"   # Or e.g. "$DEVICE_PHOTO_DIR/OpenCamera" or "$DEVICE_PHOTO_DIR $DEVICE_PHOTO_DIR/OpenCamera"

# TRAVELING MODE (when i: and f: are not mounted)
TRAVELING_STAGING_DIR="/mnt/c/Users/droll/framobil"   # Fallback when network drives unavailable

# UNUSED (reserved for future use — no script reads these today)
# LIGHTROOM_IMPORT_DIR="/path/to/lightroom/import"
# EXCLUDE_FOLDERS="WhatsApp,Screenshots"
# EXCLUDE_BEFORE_DATE="2020-01-01"
# SUMMARY_LOG="${PROJ_DIR}/logs/summary_$(date +%Y).txt"

# MEDIA TYPES (space-separated extensions without dots; used by find -iname)
MEDIA_EXTENSIONS="jpg jpeg png mp4 mov heic heif webp gif tif tiff dng cr2 cr3 nef arw rw2 orf m4v mkv avi"

# HASH REGISTRY + AUDIT (optional — leave empty to disable in copy/move)
# Parent directory you own; per-pipeline data lives under $PHOTO_HASH_STATE_DIR/$HASH_PIPELINE_SLUG/
# Use a local writable path (e.g. under the project dir). Do NOT use Lightroom archive drives (P:\grafikk).
# Optional: leave empty or unset PHOTO_HASH_STATE_DIR / HASH_PIPELINE_SLUG to disable registry + audit in copy/move.
PHOTO_HASH_STATE_DIR="${PROJ_DIR}/photo_hash_state"
# Short id for this workflow (e.g. mobil for phone → fraMobil, kamera for camera card). Never share one slug across different physical sources.
HASH_PIPELINE_SLUG="mobil"
# Lightroom (or other) import tree to scan so "already imported" hashes are known before move/delete safety checks
LIGHTROOM_IMPORTED_ROOT="/path/to/imported_to_lightroom"
# Optional second root (same index/registry run)
LIGHTROOM_IMPORTED_ROOT_EXTRA=""
# Print progress every N files when building import index
PHOTO_HASH_INDEX_PROGRESS_INTERVAL="${PHOTO_HASH_INDEX_PROGRESS_INTERVAL:-100}"

# SETUP INSTRUCTIONS:
# 1. Copy this file to config.conf: cp config.example.conf config.conf
# 2. Edit config.conf with your actual settings (set PROJ_DIR to this repo root)
# 3. Ensure SSH key has correct permissions (chmod 600)
# 4. Test connection with: bash scripts/validate_setup.sh
